annonces_audio:
  ros__parameters:
    # Empêche une annonce identique de se répéter trop rapidement.
    delai_min_repetition_s: 5.0
    # Prépare les WAV manquants avec Piper avant d'écouter /robot/evenement.
    preparer_audio_au_demarrage: true
    # Joue une annonce après la préparation initiale des fichiers WAV.
    jouer_annonce_demarrage: true
    # Exécutable Piper installé sur le Raspberry Pi 4.
    piper_executable: /usr/local/bin/piper
    # Modèle vocal français installé sur le Raspberry Pi 4.
    piper_model: /opt/piper/voix/fr_FR-siwis-low.onnx
    # Configuration associée au modèle vocal Piper.
    piper_config: /opt/piper/voix/fr_FR-siwis-low.onnx.json
    # Durée maximale accordée à Piper et au repli aplay ponctuel avant échec.
    command_timeout_s: 15.0
    # Garde aplay ouvert en raw pour éviter un clac avant chaque annonce.
    lecteur_audio_persistant_active: true
    # Contrôle la broche SD du MAX98357 pour couper l'ampli à l'arrêt du nœud.
    controle_ampli_active: true
    gpio_sd_ampli: 23
    # Format réel des WAV générés par Piper et transmis au lecteur raw persistant.
    frequence_audio_hz: 16000
    canaux_audio: 1
    largeur_echantillon_octets: 2
    # Silences envoyés pour stabiliser l'ouverture et séparer les annonces.
    silence_initial_s: 1.0
    silence_fin_annonce_s: 0.3
    # Format d'une variante parlée : nom_fichier|texte à générer avec Piper.
    # Une chaîne vide représente une variante silencieuse choisie aléatoirement.
    annonces.demarrage:
      - 'demarrage_01|Prêt à partir.'
    annonces.autonomie_demarre:
      - 'autonomie_demarre_01|Mode autonomie activé.'
    annonces.obstacle_detecte:
      - 'obstacle_detecte_01|Obstacle détecté.'
      - 'obstacle_detecte_03|Oupss, il y a quelque chose.'
      - 'obstacle_detecte_04|Quelque chose à contourner.'
      - 'obstacle_detecte_05|Obstacle droit devant, je dois contourner.'
      - 'analyse_obstacle_01|Recherche d’un passage.'
      - 'analyse_obstacle_02|Il y a un obstacle, je cherche une solution.'
      - ''
      - ''
      - ''
      - ''
    annonces.analyse_obstacle:
      - ''
    annonces.rotation_gauche:
      - 'rotation_gauche_01|À gauche ça semble mieux.'
      - ''
      - ''
      - ''
    annonces.rotation_droite:
      - 'rotation_droite_01|À droite ça semble mieux.'
      - ''
      - ''
      - ''
    annonces.recul_recuperation:
      - "recul_recuperation_01|Il faut que je sorte d'ici."
    annonces.reprise_avance:
      - ''
    annonces.arret_robot:
      - "arret_robot_01|C'est terminé."
