interface_pico_node:
  ros__parameters:
    # Port série conservé pour garder une configuration proche du mode réel.
    port: /dev/ttyS0
    # Débit UART conservé pour garder une configuration proche du mode réel.
    debit: 115200
    # Durée maximale simulée d'attente d'une réponse UART.
    timeout_lecture: 0.1
    # Intervalle entre les rappels simulés de la dernière consigne moteur.
    periode_maintien_s: 0.1
    # Intervalle entre les publications simulées de distance ultrason.
    periode_distance_s: 0.5
    # Désactive l'accès UART réel et utilise le comportement simulé.
    mode_materiel: simulation
