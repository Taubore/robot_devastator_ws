interface_pico:
  ros__parameters:
    # Port série matériel relié au Raspberry Pi Pico WH.
    port: /dev/ttyS0
    # Débit UART partagé avec le firmware du Pico.
    debit: 115200
    # Durée maximale d'attente d'une réponse UART avant de poursuivre la boucle.
    timeout_lecture: 0.02
    # Intervalle entre les rappels de la dernière consigne moteur au Pico.
    periode_maintien_s: 0.25
    # Durée maximale sans nouvelle consigne ROS avant de forcer l'arrêt des moteurs.
    delai_expiration_consigne_moteurs_s: 0.5
    # Intervalle entre les demandes de mesure ultrason envoyées au Pico.
    periode_distance_s: 0.10
    # Intervalle entre les demandes de compteurs encodeurs envoyées au Pico.
    periode_encodeurs_s: 0.10
    # Délai maximal pendant lequel un service attend sa confirmation UART.
    delai_attente_reponse_service_s: 1.0
