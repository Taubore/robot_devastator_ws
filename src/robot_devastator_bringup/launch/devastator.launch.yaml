launch:
- node:
    pkg: interface_pico
    exec: interface_pico
    name: interface_pico
    output: screen
    param:
    - from: $(find-pkg-share robot_devastator_bringup)/config/interface_pico.yaml
- node:
    pkg: robot_devastator
    exec: arbitre_commande_moteurs
    name: arbitre_commande_moteurs
    output: screen
    param:
    - from: $(find-pkg-share robot_devastator_bringup)/config/arbitre_commande_moteurs.yaml
- node:
    pkg: robot_devastator
    exec: voix_piper
    name: voix_piper
    output: screen
    param:
    - from: $(find-pkg-share robot_devastator_bringup)/config/voix_piper.yaml
- node:
    pkg: robot_devastator
    exec: annonces_audio
    name: annonces_audio
    output: screen
    param:
    - from: $(find-pkg-share robot_devastator_bringup)/config/annonces_audio.yaml
- node:
    pkg: robot_devastator
    exec: evitement_obstacle
    name: evitement_obstacle
    output: screen
    param:
    - from: $(find-pkg-share robot_devastator_bringup)/config/autonomie_simple.yaml
- node:
    pkg: robot_devastator
    exec: teleop_clavier
    name: teleop_clavier
    output: screen
    emulate_tty: true
    param:
    - from: $(find-pkg-share robot_devastator_bringup)/config/teleop_clavier.yaml
